実験協力のお願い</br>

私の研究室の学生が行うプログラム盗用検知、プログラム採点補助システム等に
関する実験へのご協力をお願いします。課題提出ページで提出されたプログラム
を、提出者が特定できない状態にして実験に用います。もし協力したくない場合、
TAに言ってもらえれば実験には用いません。実験については成績とは一切関係あ
りません。
