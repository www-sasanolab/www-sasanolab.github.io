実験協力のお願い</br>

学生（4年生、大学院生）が行うプログラム盗用検知、プログラム採点補助システ
ムに関する実験で使うために、 ご協力をお願いします。課題提出ページで提出さ
れたプログラムを、提出者が特定できない状態にして実験に用います。もし協力
したくない場合、TAに言ってもらえれば実験には用いません。実験については成
績とは一切関係ありません。
