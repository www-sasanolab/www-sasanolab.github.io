実験協力のお願い</br>

修士の学生が行うプログラム盗用検知、プログラム採点補助システムに関する実
験で使うために、 ご協力をお願いします。課題提出ページで提出されたプログラ
ムを、提出者が特定できない状態にして実験に用います。もし協力したくない場
合、TAに言ってもらえれば実験には用いません。
実験については成績とは一切関係ありません。
