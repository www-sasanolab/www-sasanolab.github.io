実験協力のお願い</br>

私の研究室の学生が行うプログラム採点補助システム、プログラミング補助ツー
ル、プログラム盗用検知等に関する実験へのご協力をお願いします。課題提出ペー
ジで提出されたプログラムを、提出者が特定できない状態にして実験に用います。
もし協力したくない場合、TAに言ってもらえれば実験には用いません。実験につ
いては成績とは一切関係ありません。
