<h1>数独の問題生成プログラム</h1>

このページでは、第37回ゲーム情報学研究会で発表した論文</br>
「初期配置が指定された場合における高難易度数独問題の自動生成手法の提案および実装」</br>
で提示した手法で実装した数独の問題生成プログラムを公開しています。


<h2>使い方</h2>
<a href="./SudokuGenerator.tar.gz">SudokuGenerator.tar.gz</a></br>
ダウンロードして展開してソースコードをコンパイルし、生成されたファイルを実行してください。</br>
詳しくはreadme.txtを参照してください。
