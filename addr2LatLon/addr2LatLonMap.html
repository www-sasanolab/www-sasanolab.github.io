<!DOCTYPE html>
<html>

<head>
  <title>Transforming addresses to latitudes and longitudes by ArcGIS service provided by ESRI with a map
    by OpenStreetMap with the library Leaflet</title>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.6.0/dist/leaflet.css"
  integrity="sha512-xwE/Az9zrjBIphAcBb3F6JVqxf46+CDLwfLMHloNu6KEQCAWi6HcDUbeOfBIptF7tcCzusKFjFw2yuvEpDL9wQ=="
  crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.6.0/dist/leaflet.js"
  integrity="sha512-gZwIG9x3wUXg2hdXF6+rVkLF/0Vi9U8D2Ntg4Ga5I5BZpVkVxlJWbSQtXPSiUTtC0TjtGOmxa1AJPuV0CPthew=="
  crossorigin=""></script>
</head>

<body>
<script>
function displayMap(latitude, longitude, addr)
{
  var mymap = L.map('mapid');
  mymap.setView([latitude, longitude], 13);
  L.tileLayer
    ('https://api.tiles.mapbox.com/v4/{id}/{z}/{x}/{y}.png?access_token=pk.eyJ1IjoibWFwYm94IiwiYSI6ImNpejY4NXVycTA2emYycXBndHRqcmZ3N3gifQ.rJcFIG214AriISLbB6B5aw', 
     {maxZoom: 18,
      attribution: 'Map data &copy;\
                    <a href="https://www.openstreetmap.org/">OpenStreetMap</a> contributors, ' +
                   '<a href="https://creativecommons.org/licenses/by-sa/2.0/">CC-BY-SA</a>, ' +
                   'Imagery © <a href="https://www.mapbox.com/">Mapbox</a>',
      id: 'mapbox.streets'
     }
    ).addTo(mymap);

  L.circle([latitude, longitude],
           100,
           {color: 'red',
            fillColor: '#f03',
            fillOpacity: 0.5
           }
          ).addTo(mymap).bindPopup(addr).openPopup();
}

function displayLatLon(array)
{
  var out = "<br/>";
  var i;
  var latitude;
  var longitude;
  var addr;
  if(array.length > 0) {
    i=0;
    addr = array[i].name
    latitude = array[i].feature.geometry.y
    longitude = array[i].feature.geometry.x
    out += "addr = " + addr + "</br>";
    out += "latitude = " + latitude + "</br>";
    out += "longitude = " + longitude + "</br>";
    document.getElementById('results').innerHTML = out;
    displayMap(latitude, longitude, addr);
  } else {
    document.getElementById('results').innerHTML = "Sorry, no results...";
  }
}
function addr_search()
{
  var input = document.getElementById("addr");
  var xmlhttp = new XMLHttpRequest();
  var url = "http://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/find?f=json&text=" + input.value;
  xmlhttp.onreadystatechange = function()
  {
    if (this.readyState == 4 && this.status == 200)
    {
      var parseResult = JSON.parse(this.responseText);
      var array = parseResult.locations;
      displayLatLon(array);
    }
  };
  xmlhttp.open("GET", url, true);
  xmlhttp.send();
}

</script>

<div id="search">
<input type="text" name="addr" value="" id="addr" size="58" />
<button type="button" onclick="addr_search();">Search</button>
<div id="results"></div>
<div id="mapid" style="width: 600px; height: 400px;"></div>
</div>

</body>
</html>
